<!-- Post card - this is the small preview card shown on the homepage.
     It gets reused on category, tag, search and author pages too. -->

<article class="card">

  <!-- Only show the cover image if one was uploaded for this post -->
  {% if post.cover %}
  <div class="card-cover-wrapper">
    <a href="{{ post.get_absolute_url }}" class="card-cover-link">
      <img
        class="card-cover"
        loading="lazy"
        src="{{ post.cover.url }}"
        alt="Post Cover {{ post.title }}"
      >
    </a>
  </div>
  {% endif %}

  <div class="card-text-wrapper">
    <div class="card-title-wrapper">
      <h2 class="card-title">
        <a href="{{ post.get_absolute_url }}" class="card-title-link">
          {{ post.title }}
        </a>
      </h2>
    </div>

    <div class="card-content-wrapper">
      <!-- This comes from the excerpt field in the admin.
           Write a proper sentence there, not just a category name. -->
      <p class="card-content">
        {{ post.excerpt }}
      </p>

      <div class="card-actions">
        <a class="card-action-link" href="{{ post.get_absolute_url }}">
          <span>Read</span>
          <i class="fa-solid fa-circle-arrow-right"></i>
        </a>
      </div>
    </div>
  </div>

</article>
